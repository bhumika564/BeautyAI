<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@1.3.0/dist/streamlit.js"></script>
    <script>
      function onDataFromPython(event) {
        if (event.data.type !== "streamlit:render") return;
        
        const args = event.data.args;
        const action = args.action;
        
        if (action === "read") {
            const data = window.localStorage.getItem("theme_preferences");
            Streamlit.setComponentValue(data ? JSON.parse(data) : null);
        } else if (action === "write") {
            window.localStorage.setItem("theme_preferences", JSON.stringify(args.data));
            Streamlit.setComponentValue("saved");
        } else if (action === "clear") {
            window.localStorage.removeItem("theme_preferences");
            Streamlit.setComponentValue("cleared");
        }
      }

      Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onDataFromPython);
      Streamlit.setComponentReady();
      Streamlit.setFrameHeight(0);
    </script>
  </head>
  <body></body>
</html>
